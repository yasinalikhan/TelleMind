# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# PostgreSQL Datasource
# =============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/telemind
spring.datasource.username=${DB_USER:yasinalikhan}
spring.datasource.password=${DB_PASS:yasin_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# =============================================
# Flyway Migrations
# =============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Disable legacy Spring SQL init (replaced by Flyway)
spring.sql.init.mode=never

# =============================================
# JWT Security
# =============================================
jwt.secret=9a4f2c8d3e7b1a5c6d8e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c
jwt.expiration=86400000

# =============================================
# Ollama AI (local LLM — llama3)
# No API key required for Ollama
# In Docker: use host.docker.internal to reach host Ollama
# =============================================
openai.api.key=
openai.api.url=${OLLAMA_URL:http://localhost:11434/v1/chat/completions}
openai.model=llama3

# =============================================
# Logging
# =============================================
logging.level.org.springframework.web=INFO
logging.level.com.telemind.analytics=DEBUG
logging.level.org.flywaydb=INFO
logging.level.org.springframework.jdbc.core=WARN
